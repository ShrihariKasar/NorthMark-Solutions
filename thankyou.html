<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You | NorthMark Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Use your main theme -->
  <link rel="stylesheet" href="index.css">

  <style>
    body {
      margin: 0;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .success-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success-card {
      background: #ffffff;
      padding: 48px 60px;
      border-radius: 26px;
      text-align: center;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.08),
        inset 0 1px 0 rgba(255,255,255,0.6);

      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1);
      max-width: 460px;
      width: 90%;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 20px;
    }

    .success-card h2 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      color: #0b0b0b;
    }

    .success-card p {
      font-size: 15px;
      color: #6b6b6b;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .success-card .btn-primary {
      padding: 14px 32px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="success-overlay">
  <div class="success-card">
    <div class="success-icon">✓</div>
    <h2>Thank You</h2>
    <p>We have received your request. Our team will contact you shortly.</p>
    <a href="index.html" class="btn-primary">Back to Home</a>
  </div>
</div>

</body>
</html>
